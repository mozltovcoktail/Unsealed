<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>UNSEALED // Recently Declassified Records</title>
    <meta name="description" content="Search recently unsealed government records — NARA, CIA, NASA, Department of War UAP files." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Crect x='4' y='12' width='24' height='3' fill='%23fff'/%3E%3Crect x='4' y='18' width='16' height='3' fill='%23fff'/%3E%3C/svg%3E" />
  </head>
  <body>
    <header class="masthead">
      <div class="masthead__row">
        <h1 class="masthead__title">UNSEALED</h1>
        <span class="masthead__meta" id="recordCount">— RECORDS</span>
      </div>
      <p class="masthead__strap">RECENTLY DECLASSIFIED // NARA · CIA · NASA · DEPARTMENT OF WAR · AARO</p>
    </header>

    <section class="search">
      <label class="search__label" for="q">QUERY</label>
      <div class="search__field">
        <input
          id="q"
          type="search"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          placeholder="MKULTRA, OPERATION MONGOOSE, UAP, JFK..."
          aria-label="Search unsealed records"
        />
        <span class="search__caret" aria-hidden="true"></span>
      </div>

      <div class="agencies" id="agencies" role="group" aria-label="Filter by agency">
        <!-- agency toggles injected here -->
      </div>
    </section>

    <main class="results" id="results" aria-live="polite">
      <p class="results__hint" id="resultsHint">▮▮▮ AWAITING QUERY ▮▮▮</p>
    </main>

    <footer class="footer">
      <span>UNSEALED v0.1</span>
      <span>SOURCE: PUBLIC RECORD</span>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
