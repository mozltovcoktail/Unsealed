name: ingest

# Weekly ingest. Reads sources.json, runs the Python ingester, applies the
# generated SQL to the remote D1 database via wrangler.
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN   — D1:Edit scope, scoped to the `unsealed` database
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account ID

on:
  schedule:
    - cron: "17 9 * * 1"   # every Monday 09:17 UTC
  workflow_dispatch:        # manual trigger
    inputs:
      group:
        description: "Single source group to run (blank = all)"
        required: false
      limit:
        description: "Max rows per group"
        required: false
        default: ""

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write       # commit ingest_report.json + seen_artifacts.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install python deps
        # curl_cffi gives real-browser TLS fingerprints; required for sources
        # behind Akamai bot-detection (e.g. aaro.mil) that JA3-block urllib.
        run: pip install --quiet requests beautifulsoup4 openpyxl curl_cffi

      - name: Run ingester
        env:
          NARA_API_KEY: ${{ secrets.NARA_API_KEY }}   # optional; nara_catalog skips if absent
        run: |
          ARGS=""
          if [ -n "${{ inputs.group }}" ]; then ARGS="$ARGS --group ${{ inputs.group }}"; fi
          if [ -n "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          python3 ingest/ingest_secrets.py $ARGS

      - name: Setup Node + wrangler
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --prefer-offline --no-audit --ignore-scripts

      - name: Apply SQL to remote D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Apply migrations first (idempotent: ALTER ... ADD COLUMN errors out on existing
          # columns, which is fine — we ignore that case).
          for f in db/migrations/*.sql; do
            echo "::group::migration $f"
            npx wrangler d1 execute unsealed --remote --file="$f" || echo "(migration may already be applied)"
            echo "::endgroup::"
          done
          # Then apply the new ingest SQL (INSERT OR IGNORE — safe to re-apply).
          for f in db/ingest_*.sql; do
            [ -f "$f" ] || continue
            echo "::group::ingest $f"
            npx wrangler d1 execute unsealed --remote --file="$f"
            echo "::endgroup::"
          done

      - name: Commit health report + seen-artifacts state
        run: |
          git config user.name "unsealed-bot"
          git config user.email "bot@users.noreply.github.com"
          git add db/ingest_report.json ingest/seen_artifacts.json || true
          if git diff --cached --quiet; then
            echo "no state changes"
          else
            git commit -m "chore(ingest): run ${{ github.run_id }}"
            git push
          fi
