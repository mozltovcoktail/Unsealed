name: discover

# Weekly auto-discovery of new declassification sources.
# Probes RSS feeds + re-scans known hub pages for new outbound .gov/.mil links.
# Promotes trusted URLs into ingest/sources.json and opens a labeled PR.
# The auto-merge workflow merges the PR after 24 hours unless a human intervenes.

on:
  schedule:
    - cron: "33 8 * * 1"   # every Monday 08:33 UTC (before ingest)
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet requests beautifulsoup4

      - name: Probe for new sources
        run: python3 ingest/discover.py

      - name: Promote trusted candidates into sources.json
        run: python3 ingest/promote.py

      - name: Open PR if anything changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "unsealed-bot"
          git config user.email "bot@users.noreply.github.com"

          if git diff --quiet ingest/sources.json ingest/discovered.json ingest/promotion_log.jsonl 2>/dev/null; then
            echo "no discoveries to promote"
            exit 0
          fi

          BRANCH="discovery/$(date -u +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git add ingest/sources.json ingest/discovered.json ingest/discovered_seen.json ingest/promotion_log.jsonl
          git commit -m "discovery: auto-add new sources ($(date -u +%Y-%m-%d))"
          git push -u origin "$BRANCH" --force

          # Idempotent label create
          gh label create auto-merge-after-24h --color FFA500 --description "Auto-merges 24h after open unless blocked" 2>/dev/null || true
          gh label create discovery --color 0E8A16 --description "Source-discovery automation" 2>/dev/null || true

          # If a PR for this branch already exists, just update; otherwise open one.
          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            echo "PR already exists for $BRANCH"
          else
            gh pr create \
              --title "discovery: auto-add new sources ($(date -u +%Y-%m-%d))" \
              --body "Auto-discovered URLs promoted into \`sources.json\`. See \`ingest/promotion_log.jsonl\` for the full audit trail. Will auto-merge after 24h unless this PR is closed or has the \`block-auto-merge\` label." \
              --label auto-merge-after-24h \
              --label discovery
          fi
